[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".git",
    ".venv",
    ".venv-ci",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    "work",
    "data",
    "models",
    "reports",
]
