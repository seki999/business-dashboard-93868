{% extends "base.html" %}
{% block content %}
<header class="page-header">
  <div><p class="eyebrow">Batch Operation</p><h1>バッチ実行結果</h1></div>
  <button class="button" data-run-batch>Run Batch</button>
</header>
<pre id="batch-result" class="result">ここに実行結果が表示されます。</pre>
<section>
  <h2>Recent Batch Logs</h2>
  <table>
    <thead><tr><th>Time</th><th>Level</th><th>Type</th><th>Message</th></tr></thead>
    <tbody>
      {% for log in logs %}
      <tr><td>{{ log.created_at }}</td><td>{{ log.level }}</td><td>{{ log.log_type }}</td><td>{{ log.message }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
