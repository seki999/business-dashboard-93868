paths:
  raw_data: data/raw/sensor_data.csv
  processed_features: data/processed/features.csv
  processed_labels: data/processed/labels.csv
  processed_metadata: data/processed/preprocess_metadata.json
  model: models/anomaly_detector.pkl
  metrics: reports/metrics.json
  report: reports/ai_validation_report.md
  figures_dir: reports/figures

data:
  n_samples: 1200
  anomaly_rate: 0.08
